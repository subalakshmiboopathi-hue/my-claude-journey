<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>NutriScope — Personal Nutrition Panel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>
<style>
  :root{
    --void:#0A1412;
    --panel:#0F1B18;
    --card:#14211D;
    --card-hi:#182A24;
    --line:#233B33;
    --line-soft:#1B2F28;
    --text:#EAF3EE;
    --text-mute:#8CA79B;
    --text-dim:#5D766C;
    --mint:#3ED9A3;
    --mint-dim:rgba(62,217,163,0.14);
    --amber:#F0A84E;
    --amber-dim:rgba(240,168,78,0.14);
    --coral:#E8695F;
    --coral-dim:rgba(232,105,95,0.14);
    --azure:#5FA8D3;
    --azure-dim:rgba(95,168,211,0.14);
    --radius:14px;
    --radius-sm:9px;
    --font-display:'Space Grotesk',sans-serif;
    --font-body:'Inter',sans-serif;
    --font-mono:'IBM Plex Mono',monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(circle at 12% -8%, rgba(62,217,163,0.09), transparent 42%),
      radial-gradient(circle at 100% 0%, rgba(95,168,211,0.07), transparent 40%),
      var(--void);
    color:var(--text);
    font-family:var(--font-body);
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  ::selection{background:var(--mint-dim);color:var(--text);}
  a{color:var(--mint);}
  ::-webkit-scrollbar{height:8px;width:8px;}
  ::-webkit-scrollbar-thumb{background:var(--line);border-radius:8px;}

  /* ---------- Header ---------- */
  .topbar{
    position:sticky;top:0;z-index:50;
    background:rgba(10,20,18,0.86);
    backdrop-filter:blur(14px);
    border-bottom:1px solid var(--line-soft);
  }
  .topbar-inner{
    max-width:1180px;margin:0 auto;padding:16px 24px;
    display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;
  }
  .brand{display:flex;align-items:center;gap:11px;}
  .brand-mark{
    width:34px;height:34px;border-radius:9px;
    background:linear-gradient(150deg,var(--mint),var(--azure));
    display:flex;align-items:center;justify-content:center;
    font-family:var(--font-mono);font-weight:600;font-size:13px;color:#06110D;
    flex-shrink:0;
  }
  .brand-text h1{font-family:var(--font-display);font-size:18px;margin:0;letter-spacing:0.2px;font-weight:700;}
  .brand-text p{margin:0;font-size:11px;color:var(--text-mute);font-family:var(--font-mono);letter-spacing:0.4px;text-transform:uppercase;}

  .tabs{display:flex;gap:4px;overflow-x:auto;padding:10px 24px 0;max-width:1180px;margin:0 auto;scrollbar-width:none;}
  .tabs::-webkit-scrollbar{display:none;}
  .tab-btn{
    flex-shrink:0;
    background:none;border:1px solid transparent;color:var(--text-mute);
    font-family:var(--font-body);font-size:13.5px;font-weight:600;
    padding:9px 14px;border-radius:10px 10px 0 0;cursor:pointer;
    transition:color .15s ease, background .15s ease;white-space:nowrap;
  }
  .tab-btn:hover{color:var(--text);background:rgba(255,255,255,0.03);}
  .tab-btn.active{color:var(--mint);background:var(--card);border-color:var(--line-soft);border-bottom:1px solid var(--card);}

  main{max-width:1180px;margin:0 auto;padding:26px 24px 80px;}
  .tab-section{display:none;animation:fadein .25s ease;}
  .tab-section.active{display:block;}
  @keyframes fadein{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}

  h2.section-title{
    font-family:var(--font-display);font-size:21px;margin:0 0 4px;font-weight:700;
    display:flex;align-items:center;gap:10px;
  }
  .section-sub{color:var(--text-mute);font-size:13.5px;margin:0 0 22px;max-width:640px;line-height:1.5;}
  .eyebrow{
    font-family:var(--font-mono);font-size:11px;color:var(--mint);letter-spacing:1.2px;text-transform:uppercase;
    margin:0 0 6px;
  }

  /* ---------- Cards / Grid ---------- */
  .card{
    background:var(--card);border:1px solid var(--line-soft);border-radius:var(--radius);
    padding:20px;
  }
  .grid{display:grid;gap:16px;}
  .grid-2{grid-template-columns:1fr 1fr;}
  .grid-3{grid-template-columns:1fr 1fr 1fr;}
  .grid-4{grid-template-columns:repeat(4,1fr);}
  @media(max-width:860px){
    .grid-2,.grid-3,.grid-4{grid-template-columns:1fr;}
  }

  label{display:block;font-size:12px;font-weight:600;color:var(--text-mute);margin-bottom:6px;letter-spacing:0.2px;}
  input,select{
    width:100%;background:var(--panel);border:1px solid var(--line);border-radius:9px;
    color:var(--text);font-family:var(--font-body);font-size:14px;padding:10px 12px;
    outline:none;transition:border-color .15s ease;
  }
  input:focus,select:focus{border-color:var(--mint);}
  input[type=number]{font-family:var(--font-mono);}
  .field{margin-bottom:14px;}
  .field-row{display:flex;gap:10px;}
  .field-row>*{flex:1;}

  .btn{
    font-family:var(--font-body);font-weight:600;font-size:13.5px;cursor:pointer;
    border:none;border-radius:9px;padding:10px 16px;
    transition:transform .1s ease, opacity .15s ease;
  }
  .btn:active{transform:scale(0.97);}
  .btn-primary{background:var(--mint);color:#06140F;}
  .btn-primary:hover{opacity:0.9;}
  .btn-ghost{background:var(--panel);color:var(--text);border:1px solid var(--line);}
  .btn-ghost:hover{border-color:var(--mint);}
  .btn-danger{background:var(--coral-dim);color:var(--coral);border:1px solid rgba(232,105,95,0.3);padding:6px 10px;font-size:12px;}
  .btn-sm{padding:7px 11px;font-size:12.5px;}

  /* ---------- Table ---------- */
  table{width:100%;border-collapse:collapse;font-size:13.5px;}
  th{
    text-align:left;font-family:var(--font-mono);font-size:10.5px;text-transform:uppercase;letter-spacing:0.8px;
    color:var(--text-dim);padding:0 10px 10px;font-weight:500;border-bottom:1px solid var(--line-soft);
  }
  td{padding:9px 10px;border-bottom:1px solid var(--line-soft);vertical-align:middle;}
  tr:last-child td{border-bottom:none;}
  .num{font-family:var(--font-mono);}
  .empty-state{
    text-align:center;padding:40px 20px;color:var(--text-mute);
  }
  .empty-state .glyph{font-size:26px;display:block;margin-bottom:8px;opacity:0.6;}
  .empty-state b{color:var(--text);}

  /* ---------- Badges/tags ---------- */
  .tag{
    display:inline-flex;align-items:center;gap:4px;font-family:var(--font-mono);font-size:10.5px;font-weight:600;
    padding:3px 8px;border-radius:100px;letter-spacing:0.4px;text-transform:uppercase;
  }
  .tag-low{background:var(--amber-dim);color:var(--amber);}
  .tag-ok{background:var(--mint-dim);color:var(--mint);}
  .tag-high{background:var(--coral-dim);color:var(--coral);}
  .tag-veg{background:var(--mint-dim);color:var(--mint);}
  .tag-egg{background:var(--azure-dim);color:var(--azure);}
  .tag-nonveg{background:var(--coral-dim);color:var(--coral);}

  /* ---------- Specimen grid (signature element) ---------- */
  .specimen-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;}
  .specimen{
    background:var(--panel);border:1px solid var(--line-soft);border-radius:10px;padding:13px 14px;position:relative;overflow:hidden;
  }
  .specimen::before{
    content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
  }
  .specimen.low::before{background:var(--amber);}
  .specimen.ok::before{background:var(--mint);}
  .specimen.high::before{background:var(--coral);}
  .specimen-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
  .specimen-name{font-size:12.5px;font-weight:600;color:var(--text);}
  .specimen-code{display:block;font-family:var(--font-mono);font-size:9.5px;color:var(--text-dim);letter-spacing:0.5px;margin-top:1px;}
  .specimen-values{font-family:var(--font-mono);font-size:15px;margin-bottom:10px;}
  .specimen-values .target{color:var(--text-dim);font-size:12px;}
  .bracket{position:relative;height:6px;border-radius:4px;background:var(--line);overflow:visible;}
  .bracket-fill{position:absolute;top:0;left:0;bottom:0;border-radius:4px;}
  .bracket-marker{
    position:absolute;top:-3px;width:2px;height:12px;background:var(--text);border-radius:1px;
  }
  .bracket-ref{font-family:var(--font-mono);font-size:9px;color:var(--text-dim);display:flex;justify-content:space-between;margin-top:5px;}

  /* ---------- Dashboard stat strip ---------- */
  .stat-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px;}
  @media(max-width:860px){.stat-strip{grid-template-columns:repeat(2,1fr);}}
  .stat{background:var(--panel);border:1px solid var(--line-soft);border-radius:10px;padding:14px 16px;}
  .stat .stat-label{font-family:var(--font-mono);font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.6px;}
  .stat .stat-val{font-family:var(--font-display);font-size:22px;font-weight:700;margin-top:4px;}
  .stat .stat-sub{font-size:11.5px;color:var(--text-mute);margin-top:2px;}

  .chart-card{background:var(--panel);border:1px solid var(--line-soft);border-radius:12px;padding:18px;}
  .chart-card h3{font-family:var(--font-display);font-size:14.5px;margin:0 0 12px;}
  canvas{max-width:100%;}

  .deficiency-row,.excess-row{
    display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--line-soft);
  }
  .deficiency-row:last-child,.excess-row:last-child{border-bottom:none;}
  .dr-name{font-size:13.5px;font-weight:600;}
  .dr-meta{font-family:var(--font-mono);font-size:11.5px;color:var(--text-mute);}

  .rec-card{background:var(--panel);border:1px solid var(--line-soft);border-radius:12px;padding:16px 18px;margin-bottom:12px;}
  .rec-card h4{margin:0 0 6px;font-family:var(--font-display);font-size:14px;display:flex;align-items:center;gap:8px;}
  .rec-card p{margin:0;font-size:13px;color:var(--text-mute);line-height:1.55;}
  .rec-icon{width:24px;height:24px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;}

  .risk-card{border-radius:12px;padding:16px 18px;margin-bottom:12px;border:1px solid var(--line-soft);}
  .risk-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
  .risk-head h4{margin:0;font-family:var(--font-display);font-size:14.5px;}
  .risk-card p{margin:0;font-size:13px;color:var(--text-mute);line-height:1.55;}

  .disclaimer-banner{
    background:var(--amber-dim);border:1px solid rgba(240,168,78,0.3);border-radius:10px;
    padding:12px 16px;font-size:12.5px;color:var(--amber);margin-bottom:20px;line-height:1.5;
  }
  .disclaimer-banner b{color:var(--amber);}

  footer{
    text-align:center;padding:26px 24px 40px;color:var(--text-dim);font-size:11.5px;font-family:var(--font-mono);
  }
  footer a{color:var(--text-mute);}

  .meal-day{background:var(--panel);border:1px solid var(--line-soft);border-radius:12px;padding:16px;margin-bottom:16px;}
  .meal-day h3{font-family:var(--font-display);font-size:15.5px;margin:0 0 4px;}
  .meal-slot{border-top:1px solid var(--line-soft);padding:12px 0;}
  .meal-slot:first-of-type{border-top:none;}
  .meal-slot-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
  .meal-slot-head h4{margin:0;font-size:13px;font-family:var(--font-mono);text-transform:uppercase;letter-spacing:0.6px;color:var(--text-mute);}
  .meal-slot-head .meal-cal{font-family:var(--font-mono);font-size:12.5px;color:var(--mint);}
  .meal-item{display:flex;justify-content:space-between;align-items:center;font-size:13px;padding:5px 0;color:var(--text);}
  .meal-item span.sub{color:var(--text-mute);font-family:var(--font-mono);font-size:11.5px;}
  .add-row{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;}
  .add-row select{flex:2;min-width:140px;}
  .add-row input{flex:1;min-width:70px;}
  .add-row button{flex-shrink:0;}
  .day-total-bar{margin-top:12px;padding-top:12px;border-top:1px dashed var(--line);}
  .progress-track{height:8px;background:var(--line);border-radius:6px;overflow:hidden;margin-top:6px;}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--mint),var(--azure));}

  .source-item{padding:14px 0;border-bottom:1px solid var(--line-soft);}
  .source-item:last-child{border-bottom:none;}
  .source-item h4{margin:0 0 4px;font-size:13.5px;font-family:var(--font-display);}
  .source-item p{margin:0;font-size:12.5px;color:var(--text-mute);line-height:1.5;}

  .csv-drop{
    border:1.5px dashed var(--line);border-radius:12px;padding:24px;text-align:center;
    background:var(--panel);cursor:pointer;transition:border-color .15s ease;
  }
  .csv-drop:hover{border-color:var(--mint);}
  .csv-drop input{display:none;}
  .csv-status{margin-top:12px;font-size:12.5px;color:var(--text-mute);}

  .flex-between{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;}
</style>
</head>

/* =========================================================
   NUTRITION MATH
========================================================= */
function getTargets(p){
  const {age,gender,height,weight,activity} = p;
  const bmrMale = 10*weight + 6.25*height - 5*age + 5;
  const bmrFemale = 10*weight + 6.25*height - 5*age - 161;
  const bmr = gender==='male' ? bmrMale : gender==='female' ? bmrFemale : (bmrMale+bmrFemale)/2;
  const actMap = {sedentary:1.2,light:1.375,moderate:1.55,active:1.725,veryactive:1.9};
  const tdee = bmr * (actMap[activity]||1.375);
  const proteinPerKg = {sedentary:0.8,light:0.9,moderate:1.0,active:1.2,veryactive:1.4}[activity]||0.9;
  const protein = weight*proteinPerKg;
  const proteinCal = protein*4;
  const fat = (tdee*0.27)/9;
  const fatCal = fat*9;
  const carbs = Math.max(0,(tdee - proteinCal - fatCal))/4;
  const fiber = gender==='male' ? (age>50?30:38) : (age>50?21:25);
  const iron = gender==='male' ? 8 : (age>50?8:18);
  const calcium = age>50?1200:1000;
  const vitaminC = gender==='male'?90:75;
  const vitaminD = age>70?20:15;
  const vitaminB12 = 2.4;
  const potassium = gender==='male'?3400:2600;
  const magnesium = gender==='male' ? (age>30?420:400) : (age>30?320:310);
  const zinc = gender==='male'?11:8;
  const vitaminA = gender==='male'?900:700;
  const folate = 400;
  const sodiumLimit = 2300;
  return {calories:tdee,protein,carbs,fat,fiber,iron,calcium,vitaminC,vitaminD,vitaminB12,potassium,magnesium,zinc,vitaminA,folate,sodiumLimit};
}

function gramsForEntry(entry){
  const f = foodById(entry.foodId);
  if(!f) return 0;
  return entry.unit==='g' ? entry.qty : entry.qty*f.servG;
}

function computeTotals(entries){
  const totals = {calories:0};
  Object.keys(FIELD_MAP).forEach(k=>{ if(FIELD_MAP[k]!=='cal') totals[FIELD_MAP[k]] = 0; });
  entries.forEach(entry=>{
    const f = foodById(entry.foodId);
    if(!f) return;
    const grams = gramsForEntry(entry);
    const factor = grams/100;
    Object.keys(f.n).forEach(k=>{
      const key = FIELD_MAP[k];
      totals[key] = (totals[key]||0) + f.n[k]*factor;
    });
  });
  return totals;
}

function pct(actual,target){ return target>0 ? (actual/target)*100 : 0; }
function statusFor(nutrientKey, p){
  if(nutrientKey==='sodium') return p>110 ? 'high' : 'ok';
  if(p<70) return 'low';
  if(p>130) return 'high';
  return 'ok';
}

function renderTabs(){
  const el = document.getElementById('tabs');
  el.innerHTML = TABS.map(t=>`<button class="tab-btn ${t.id===activeTab?'active':''}" data-tab="${t.id}">${t.label}</button>`).join('');

  });

  renderTabs();
  const main = document.getElementById('main');

function profileStatCards(){

  return `

    <div class="stat"><div class="stat-label">Fat target</div><div class="stat-val">${Math.round(t.fat)}g</div><div class="stat-sub">~${Math.round(t.fat*9/t.calories*100)}% of calories</div></div>
  `;
}

function bindProfileEvents(){
  const ids = {'p-age':'age','p-gender':'gender','p-height':'height','p-weight':'weight','p-activity':'activity','p-diet':'diet'};
  Object.keys(ids).forEach(id=>{
    const el = document.getElementById(id);
    if(!el) return;
    el.addEventListener('change', ()=>{
      const key = ids[id];
      profile[key] = (el.type==='number') ? parseFloat(el.value)||0 : el.value;
      persist();
      renderAll();
    });
  });
}

function bindCsvEvents(){
  const drop = document.getElementById('csv-drop');
  const fileInput = document.getElementById('csv-file');
  const status = document.getElementById('csv-status');
  const sampleBtn = document.getElementById('csv-sample');
  if(!drop) return;

  drop.addEventListener('click', ()=> fileInput.click());
  drop.addEventListener('dragover', e=>{ e.preventDefault(); drop.style.borderColor='var(--mint)'; });
  drop.addEventListener('dragleave', ()=>{ drop.style.borderColor='var(--line)'; });
  drop.addEventListener('drop', e=>{
    e.preventDefault(); drop.style.borderColor='var(--line)';
    if(e.dataTransfer.files.length) handleCsvFile(e.dataTransfer.files[0], status);
  });
  fileInput.addEventListener('change', e=>{
    if(e.target.files.length) handleCsvFile(e.target.files[0], status);
  });
  sampleBtn.addEventListener('click', ()=>{
    const sample = "food,quantity,unit\nRice,2,serving\nDal,1,serving\nEgg,2,serving\nSpinach,100,g\nBanana,1,serving";
    const blob = new Blob([sample], {type:'text/csv'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'nutriscope_sample.csv'; a.click();
    URL.revokeObjectURL(url);
  });
}

function handleCsvFile(file, statusEl){
  const reader = new FileReader();
  reader.onload = ()=>{
    const text = reader.result;
    const lines = text.split(/\r?\n/).map(l=>l.trim()).filter(l=>l.length);
    if(!lines.length){ statusEl.textContent='The file looks empty.'; return; }
    let start = 0;
    if(/^food/i.test(lines[0])) start = 1;
    let added = 0, skipped = 0;
    const lookup = {};
    FOODS.forEach(f=> lookup[f.name.toLowerCase().replace(/\(.*?\)/g,'').trim()] = f);
    FOODS.forEach(f=> lookup[f.id] = f);
    for(let i=start;i<lines.length;i++){
      const parts = lines[i].split(',').map(p=>p.trim());
      if(parts.length<2) { skipped++; continue; }
      const nameRaw = parts[0].toLowerCase();
      let match = FOODS.find(f=>f.name.toLowerCase()===nameRaw) ||
                  lookup[nameRaw] ||
                  FOODS.find(f=>f.name.toLowerCase().includes(nameRaw) || nameRaw.includes(f.id));
      const qty = parseFloat(parts[1]);
      let unit = (parts[2]||'g').toLowerCase();
      unit = unit.startsWith('s') ? 'serving' : 'g';
      if(match && !isNaN(qty)){
        log.push({uid:uid++, foodId:match.id, qty, unit});
        added++;
      } else { skipped++; }
    }
    persist();
    statusEl.innerHTML = `<span style="color:var(--mint)">${added} entries added</span>${skipped?`, <span style="color:var(--amber)">${skipped} rows skipped (no match)</span>`:''}. Check the Food Log tab.`;
  };
  reader.readAsText(file);
}

  if((rows.find(r=>r.k==='protein')||{}).p < 80){
    const suggestion = profile.diet==='Vegetarian' ? 'paneer, dal, chana, tofu, or soybean' : profile.diet==='Eggetarian' ? 'eggs, paneer, or dal' : 'chicken, fish, eggs, or dal';
    swaps.push({from:'Carb-only meals', to:`Meals that include ${suggestion}`, why:'raises protein without a large calorie increase.'});
  }
  const swapCards = swaps.map(s=>`
    <div class="rec-card">
      <h4><span class="rec-icon" style="background:var(--azure-dim);color:var(--azure);">⇄</span>Swap</h4>
      <p><b style="color:var(--text);">${s.from}</b> → <b style="color:var(--text);">${s.to}</b> — ${s.why}</p>
    </div>`).join('');

  const portionCards = [];
  const calPct = pct(totals.calories, targets.calories);
  if(calPct > 115){
    portionCards.push(`Your logged calories are running about ${Math.round(calPct-100)}% above target. Trimming the largest single entry in your log by roughly a quarter typically brings the day back in range.`);
  } else if(calPct < 85){
    portionCards.push(`Your logged calories are about ${Math.round(100-calPct)}% under target. Adding one more serving of a staple you already eat (rice, roti, dal, or a fruit) is an easy way to close the gap.`);
  } else {
    portionCards.push(`Your total calorie intake is within a healthy range of your target — portion sizes look about right today.`);
  }
  const sodiumP = pct(totals.sodium||0, targets.sodiumLimit);
  if(sodiumP>100) portionCards.push(`Sodium is at ${Math.round(sodiumP)}% of the recommended daily limit — consider reducing packaged/salted items like bread, idli, dosa batter, or cheese, or pairing them with low-sodium sides.`);

  return `
  <div class="eyebrow">Guidance</div>
  <h2 class="section-title">Recommendations</h2>
  <p class="section-sub">Generated from today's log, filtered to your ${profile.diet.toLowerCase()} preference. These are food-pattern suggestions, not a prescription.</p>

  <h3 style="font-family:var(--font-display);font-size:15px;margin:0 0 10px;">Food additions</h3>
  ${additionCards || `<p style="color:var(--text-mute);font-size:13px;">No major shortfalls detected — nothing urgent to add.</p>`}

  <h3 style="font-family:var(--font-display);font-size:15px;margin:22px 0 10px;">Food swaps</h3>
  ${swapCards || `<p style="color:var(--text-mute);font-size:13px;">No swaps needed based on today's pattern.</p>`}

  <h3 style="font-family:var(--font-display);font-size:15px;margin:22px 0 10px;">Portion adjustments</h3>
  ${portionCards.map(p=>`<div class="rec-card"><h4><span class="rec-icon" style="background:var(--mint-dim);color:var(--mint);">≈</span>Portion note</h4><p>${p}</p></div>`).join('')}
  `;
}

/* =========================================================
   RISK ANALYSIS TAB
========================================================= */
function sectionRisk(){
  if(log.length===0){
    return `
      <div class="eyebrow">Pattern check</div>
      <h2 class="section-title">Risk analysis</h2>
      <div class="card"><div class="empty-state"><span class="glyph">△</span><b>Nothing to evaluate yet.</b><br>Log a day of food to see pattern-based flags here.</div></div>
    `;
  }
  const targets = getTargets(profile);
  const totals = computeTotals(log);
  const P = k => pct(totals[k]||0, targets[k]);
  const risks = [];

  if(P('iron')<70){
    risks.push({title:'Iron shortfall pattern', level:P('iron')<40?'Elevated':'Watch', color: P('iron')<40?'coral':'amber',
      note: profile.diet!=='Non-Vegetarian'
        ? 'Plant-based iron (non-heme) absorbs less efficiently than iron from meat or fish. Pairing iron-rich foods with a vitamin C source in the same meal can help. A sustained shortfall like this is worth mentioning to a doctor, especially if you notice fatigue.'
        : 'A sustained shortfall in iron intake over time is associated with fatigue and, eventually, anemia. Worth mentioning to a doctor if it persists.'});
  }
  if(P('calcium')<70 && P('vitaminD')<70){
    risks.push({title:'Bone-health support pattern', level:'Watch', color:'amber',
      note:'Both calcium and vitamin D are running low, and the two work together for bone density. Dairy, ragi, tofu, and sesame add calcium; sensible sun exposure and fortified foods help with vitamin D.'});
  }
  if(profile.diet!=='Non-Vegetarian' && P('vitaminB12')<70){
    risks.push({title:'Vitamin B12 deficiency risk', level:'Elevated', color:'coral',
      note:'B12 occurs almost exclusively in animal foods, so vegetarian and eggetarian diets are structurally at higher risk of falling short. Fortified foods, dairy, and eggs help; some vegetarians benefit from a supplement — a doctor or dietitian can confirm with a blood test.'});
  }
  if(P('fiber')<70){
    risks.push({title:'Low fiber pattern', level:'Watch', color:'amber',
      note:'Consistently low fiber is linked to digestive discomfort and, long-term, cardiometabolic risk. Whole grains, legumes, and vegetables are the most efficient way to close this.'});
  }
  const sodiumP = pct(totals.sodium||0, targets.sodiumLimit);
  if(sodiumP>110){
    risks.push({title:'Elevated sodium pattern', level: sodiumP>140?'Elevated':'Watch', color: sodiumP>140?'coral':'amber',
      note:'Sodium intake is running above the general daily limit. Regularly high sodium is a known contributor to elevated blood pressure over time.'});
  }
  if(P('protein')<70){
    risks.push({title:'Low protein pattern', level:'Watch', color:'amber',
      note:'Protein intake is trending below your target. Over time, this can make it harder to maintain muscle, especially alongside an active lifestyle.'});
  }
  if(P('vitaminC')<70){
    risks.push({title:'Low vitamin C pattern', level:'Watch', color:'amber',
      note:'Vitamin C supports immune function and also improves iron absorption from plant foods. Citrus fruit, bell peppers, and amla are dense sources.'});
  }

  return `
  <div class="eyebrow">Pattern check</div>
  <h2 class="section-title">Risk analysis</h2>
  <p class="section-sub">Heuristic flags based on today's log compared with general reference intakes — not a diagnosis. See the disclaimer below.</p>
  <div class="disclaimer-banner"><b>Educational only:</b> this analysis pattern-matches nutrient shortfalls against commonly cited risk associations. It cannot see your bloodwork, history, or medications, and does not replace a clinician's judgment.</div>
  ${risks.length ? risks.map(r=>`
    <div class="risk-card" style="background:var(--${r.color}-dim);border-color:rgba(${r.color==='coral'?'232,105,95':'240,168,78'},0.3);">
      <div class="risk-head"><h4>${r.title}</h4><span class="tag tag-${r.color==='coral'?'high':'low'}">${r.level}</span></div>
      <p>${r.note}</p>
    </div>`).join('') : `<div class="card"><div class="empty-state"><span class="glyph">✓</span><b>No notable risk patterns today.</b><br>Today's log looks reasonably balanced across the flags we check for.</div></div>`}
  `;
}

/* =========================================================
   SOURCES & DISCLAIMER TAB
========================================================= */
function sectionSources(){
  return `
  <div class="eyebrow">Methodology</div>
  <h2 class="section-title">Sources &amp; disclaimer</h2>
  <div class="disclaimer-banner">
    <b>NutriScope is an educational tool, not medical advice.</b> It does not diagnose, treat, or replace consultation with a registered dietitian or physician. Individual needs vary with health conditions, pregnancy, medication, and lab results that this tool cannot see. If something here concerns you, especially a flagged risk, talk to a qualified professional.
  </div>
  <div class="card">
    <div class="source-item">
      <h4>Energy &amp; macro targets</h4>
      <p>Resting energy is estimated with the Mifflin-St Jeor equation, scaled by a standard activity multiplier. Protein, carbohydrate, and fat targets follow commonly used macronutrient distribution ranges; fiber targets follow age/gender adult reference values.</p>
    </div>
    <div class="source-item">
      <h4>Micronutrient targets</h4>
      <p>Reference intakes for iron, calcium, vitamin C, vitamin D, B12, potassium, magnesium, zinc, vitamin A, and folate are simplified adult RDA-style values by age and gender, broadly aligned with ICMR-NIN and comparable international dietary guidelines. They are population averages, not individually tailored prescriptions.</p>
    </div>
    <div class="source-item">
      <h4>Food composition data</h4>
      <p>Per-100g values for the 60 foods in this tool are approximate, generalized figures typical of Indian Food Composition Tables (NIN) and USDA FoodData Central style databases. Real products vary by brand, cooking method, and preparation — treat every number here as a reasonable estimate, not a lab assay of your specific meal.</p>
    </div>
    <div class="source-item">
      <h4>Risk analysis</h4>
      <p>Risk flags are pattern-based heuristics linking a nutrient shortfall or excess to a commonly cited association (for example, low iron with fatigue risk). They are not derived from your medical history and carry no diagnostic weight.</p>
    </div>
    <div class="source-item">
      <h4>Privacy</h4>
      <p>Everything you enter is stored only in your own browser's local storage. There is no backend, no account, and no data leaves this page.</p>
    </div>
  </div>
  `;
}

   BOOT

renderAll();
</script>
